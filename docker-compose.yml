version: "3.9"

services:
  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./services/api-gateway:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - auth-service
      - task-service
      - notification-service

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    environment:
      AUTH_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@auth-db:5432/auth_db
      AUTH_JWT_SECRET_KEY: ${AUTH_JWT_SECRET_KEY:-change-me-in-production}
      AUTH_JWT_EXPIRE_MINUTES: ${AUTH_JWT_EXPIRE_MINUTES:-60}
    ports:
      - "8001:8000"
    volumes:
      - ./services/auth-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - auth-db

  task-service:
    build: ./services/task-service
    container_name: task-service
    ports:
      - "8002:8000"
    volumes:
      - ./services/task-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - task-db

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "8003:8000"
    volumes:
      - ./services/notification-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data

  task-db:
    image: postgres:16-alpine
    container_name: task-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: task_db
    ports:
      - "5434:5432"
    volumes:
      - task_data:/var/lib/postgresql/data

volumes:
  auth_data:
  task_data:
